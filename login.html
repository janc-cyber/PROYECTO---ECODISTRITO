<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EcoDistrito - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container login-page">
    
    <!-- IZQUIERDA (IMAGEN) -->
    <div class="left">
        <img src="Imagenes/Fondo.png" alt="Fondo">
    </div>

    <!-- DERECHA (LOGIN) -->
    <div class="right">
        <div class="login-box">
            
            <img src="Imagenes/Logo sin fondo.png" class="logo">

            <h2>Bienvenido</h2>

            <input type="text" id="user" placeholder="Usuario" autocomplete="username" required>
            <input type="password" id="pass" placeholder="Contraseña" autocomplete="current-password" required>

            <button onclick="login()" class="btn" aria-label="iniciar sesión">Iniciar Sección</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
